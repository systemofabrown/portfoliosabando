<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rhino - Erick Sabando</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: radial-gradient(ellipse 120% 90% at 50% -10%, #2a2a2f, #121214 72%);
    color: #f2f2f5;
    font-family: "Archivo", system-ui, sans-serif;
    display: flex; flex-direction: column;
    -webkit-font-smoothing: antialiased;
  }
  header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 1.6rem clamp(1.5rem, 4vw, 3.5rem);
    border-bottom: 1px solid rgba(255,255,255,0.10);
  }
  .back {
    font-family: "Geist Mono", monospace; font-size: 0.76rem; text-transform: uppercase;
    letter-spacing: 0.18em; color: #d11a35; text-decoration: none;
    transition: color 0.3s ease, transform 0.3s ease; display: inline-block;
  }
  .back:hover { color: #fff; transform: translateX(-3px); }
  .brand {
    font-family: "Geist Mono", monospace; font-size: 0.74rem; letter-spacing: 0.16em;
    text-transform: uppercase; color: rgba(242,242,245,0.6);
  }
  main {
    flex: 1; display: flex; flex-direction: column; justify-content: flex-start;
    padding: clamp(3rem, 7vw, 5rem) clamp(1.5rem, 4vw, 3.5rem) 7rem; width: 100%; max-width: 1400px;
  }
  .eyebrow {
    font-family: "Geist Mono", monospace; color: #d11a35; text-transform: uppercase;
    letter-spacing: 0.22em; font-size: 0.8rem; margin-bottom: 1rem;
  }
  h1 {
    font-family: "Anton", "Impact", sans-serif; text-transform: uppercase;
    font-size: clamp(2.8rem, 11vw, 7rem); line-height: 0.9; letter-spacing: 0.02em;
  }
  .lead {
    margin-top: 1.4rem; max-width: 60ch; color: rgba(242,242,245,0.72);
    font-size: 1.1rem; line-height: 1.65;
  }
  /* gallery of clickable stills */
  .gallery {
    margin-top: 2.6rem; display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.4rem;
  }
  .shot {
    position: relative; padding: 0; border: 1px solid rgba(255,255,255,0.16);
    border-radius: 12px; overflow: hidden; cursor: pointer; background: #0c0c0e;
    aspect-ratio: 16 / 9; opacity: 0.9;
    box-shadow: 0 12px 30px rgba(0,0,0,0.34);
    transition: opacity .35s ease, transform .35s ease, border-color .35s ease;
  }
  .shot img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .5s ease; }
  .shot:hover { opacity: 1; transform: translateY(-3px); border-color: rgba(255,255,255,0.42); }
  .shot:hover img { transform: scale(1.05); }
  .shot:focus-visible { outline: 2px solid #d11a35; outline-offset: 2px; }
  .shot-num {
    position: absolute; top: 0.8rem; left: 0.8rem; font-family: "Geist Mono", monospace;
    font-size: 0.64rem; letter-spacing: 0.16em; color: #fff; background: rgba(14,14,17,0.6);
    border: 1px solid rgba(255,255,255,0.28); border-radius: 999px; padding: 0.3rem 0.7rem;
    -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
  }
  .shot-360 {
    position: absolute; bottom: 0.8rem; right: 0.8rem; font-family: "Geist Mono", monospace;
    font-size: 0.62rem; letter-spacing: 0.14em; color: #fff; background: rgba(209,26,53,0.72);
    border: 1px solid rgba(255,255,255,0.3); border-radius: 999px; padding: 0.3rem 0.65rem;
    -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
  }
  /* lightbox */
  .lightbox {
    position: fixed; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center;
    padding: 3vh 3vw; background: rgba(8,8,9,0.93);
    -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);
    opacity: 0; pointer-events: none; transition: opacity .3s ease;
  }
  .lightbox.open { opacity: 1; pointer-events: auto; }
  .lightbox img { max-width: 94vw; max-height: 90vh; object-fit: contain; border-radius: 6px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6); }
  .lightbox-close {
    position: absolute; top: 1.1rem; right: 1.3rem; width: 44px; height: 44px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.12); color: #fff;
    font-size: 1.6rem; line-height: 1; cursor: pointer; -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
    transition: background .3s ease;
  }
  .lightbox-close:hover { background: rgba(255,255,255,0.24); }
  .lightbox.is-turntable img { cursor: grab; }
  .lightbox.is-turntable img:active { cursor: grabbing; }
  .lightbox-hint {
    position: absolute; bottom: 1.4rem; left: 50%; transform: translateX(-50%); display: none;
    font-family: "Geist Mono", monospace; font-size: 0.7rem; letter-spacing: 0.16em;
    text-transform: uppercase; color: rgba(255,255,255,0.7); pointer-events: none;
  }
  footer {
    padding: 1.4rem clamp(1.5rem, 4vw, 3.5rem); border-top: 1px solid rgba(255,255,255,0.10);
    font-family: "Geist Mono", monospace; font-size: 0.72rem; letter-spacing: 0.14em;
    text-transform: uppercase; color: #d11a35;
  }
  /* mobile-subpage */
  @media (max-width: 560px) {
    header { padding: 1.1rem 1.25rem; }
    .brand { display: none; }
    main { padding-left: 1.25rem; padding-right: 1.25rem; }
  }
</style>
</head>
<body>
  <header>
    <a class="back" href="../portfolio.html">&larr; Back to portfolio</a>
    <span class="brand">Erick Sabando &middot; Arch Designer</span>
  </header>
  <main>
    <div class="eyebrow">[ Rhino &middot; Concept Massing ]</div>
    <h1>Rhino</h1>
    <p class="lead">Concept massing studies modeled in Rhino and rendered as clean clay -
      exploratory schemes for the site. Click any still to enlarge.</p>
    <div class="gallery">
      <button class="shot" data-turntable="rhino/turntable-1" data-frames="49"><img src="rhino/massing-01.jpg" alt="Massing study 01 - 360° turntable" loading="lazy" /><span class="shot-num">01</span><span class="shot-360">&#8635; 360&deg;</span></button>
      <button class="shot" data-turntable="rhino/turntable-2" data-frames="60"><img src="rhino/massing-02.jpg" alt="Massing study 02 - 360° turntable" loading="lazy" /><span class="shot-num">02</span><span class="shot-360">&#8635; 360&deg;</span></button>
      <button class="shot" data-full="rhino/massing-03.jpg"><img src="rhino/massing-03.jpg" alt="Massing study 03" loading="lazy" /><span class="shot-num">03</span></button>
      <button class="shot" data-full="rhino/massing-04.jpg"><img src="rhino/massing-04.jpg" alt="Massing study 04" loading="lazy" /><span class="shot-num">04</span></button>
      <button class="shot" data-full="rhino/massing-05.jpg"><img src="rhino/massing-05.jpg" alt="Massing study 05" loading="lazy" /><span class="shot-num">05</span></button>
      <button class="shot" data-full="rhino/massing-06.jpg"><img src="rhino/massing-06.jpg" alt="Massing study 06" loading="lazy" /><span class="shot-num">06</span></button>
    </div>
  </main>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="lightbox-close" aria-label="Close">&times;</button>
    <img id="lightbox-img" src="" alt="" />
    <div class="lightbox-hint" id="lightbox-hint">Scroll to spin &middot; drag to scrub</div>
  </div>

  <footer>&copy; 2025 - Erick Sabando</footer>

  <script>
    (function () {
      var lb = document.getElementById('lightbox'),
          img = document.getElementById('lightbox-img'),
          hint = document.getElementById('lightbox-hint');
      var tt = { frames: [], idx: 0, timer: null, drag: false, x0: 0, i0: 0 };

      function pad(n){ return (n < 10 ? '0' : '') + n; }
      function ttClear(){ if (tt.timer){ clearInterval(tt.timer); tt.timer = null; } tt.frames = []; }
      function ttShow(i){
        if (!tt.frames.length) return;
        var n = tt.frames.length; tt.idx = ((i % n) + n) % n; img.src = tt.frames[tt.idx].src;
      }
      function openTurntable(base, count, alt){
        ttClear(); tt.idx = 0;
        for (var i = 1; i <= count; i++){ var im = new Image(); im.src = base + '/' + pad(i) + '.jpg'; tt.frames.push(im); }
        img.alt = alt || ''; img.src = tt.frames[0].src;
        lb.classList.add('open', 'is-turntable'); lb.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';
        if (hint) hint.style.display = 'block';
      }
      function openStill(src, alt){
        ttClear(); img.src = src; img.alt = alt || '';
        lb.classList.add('open'); lb.classList.remove('is-turntable'); lb.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';
        if (hint) hint.style.display = 'none';
      }
      function close(){
        ttClear(); lb.classList.remove('open', 'is-turntable'); lb.setAttribute('aria-hidden', 'true');
        document.body.style.overflow = ''; img.src = '';
      }
      document.querySelectorAll('.shot').forEach(function (b) {
        b.addEventListener('click', function () {
          var alt = b.querySelector('img').alt;
          if (b.dataset.turntable) openTurntable(b.dataset.turntable, parseInt(b.dataset.frames || '60', 10), alt);
          else openStill(b.dataset.full, alt);
        });
      });
      // drag to scrub the turntable
      img.addEventListener('pointerdown', function (e) {
        if (!tt.frames.length) return;
        tt.drag = true; tt.x0 = e.clientX; tt.i0 = tt.idx;
        try { img.setPointerCapture(e.pointerId); } catch (_) {}
        e.preventDefault();
      });
      window.addEventListener('pointermove', function (e) {
        if (!tt.drag) return; ttShow(tt.i0 + Math.round((e.clientX - tt.x0) / 12));
      });
      window.addEventListener('pointerup', function () { tt.drag = false; });
      // scroll to spin
      lb.addEventListener('wheel', function (e) {
        if (!tt.frames.length) return;
        e.preventDefault();
        ttShow(tt.idx + (e.deltaY > 0 ? 1 : -1) * Math.max(1, Math.round(Math.abs(e.deltaY) / 40)));
      }, { passive: false });
      lb.addEventListener('click', function (e) {
        if (e.target === lb || e.target.classList.contains('lightbox-close')) close();
      });
      document.addEventListener('keydown', function (e) { if (e.key === 'Escape') close(); });
    })();
  </script>
</body>
</html>
